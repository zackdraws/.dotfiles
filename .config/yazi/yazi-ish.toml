[mgr]
ratio = [1, 2, 3]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_hidden = true
show_symlink = true
scrolloff = 5

[preview]
max_width = 1600
max_height = 2400

[opener]
edit = [
  { run = 'emacs -nw "$@"', block = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { name = "*.org", use = "edit" },
  { name = "*.md", use = "edit" },
  { name = "*.txt", use = "edit" },
]
