---
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
  
    volumes:
      - C:/Users/ok/.config/.docker/jellyfin/config:/config
      - C:/Users/ok/Videos/Movies_TV:/data/tvshows
      - C:/Users/ok/Videos/videosnow:/data/videosnow
    ports:
      - 8096:8096
      - 8920:8920 #optional
      - 7359:7359/udp #optional
      - 1900:1900/udp #optional
    restart: unless-stopped
