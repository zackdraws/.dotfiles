# PC / MSYS2 UCRT64 tmux config

unbind C-b
set -g prefix C-q
bind C-q send-prefix

unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

set -g default-shell "/usr/bin/bash"
set -g default-command "exec /usr/bin/bash -l"
set-environment -g MSYSTEM "UCRT64"
set-environment -g MSYSTEM_PREFIX "/ucrt64"
set-environment -g MINGW_PREFIX "/ucrt64"
set-environment -g MSYS2_PATH_TYPE "inherit"
set-environment -g CHERE_INVOKING "1"
set-environment -g PATH "/ucrt64/bin:/home/ok/.local/bin:/usr/local/bin:/usr/bin:/bin:/opt/bin:/c/Windows/System32:/c/Windows:/c/Windows/System32/Wbem:/c/Windows/System32/WindowsPowerShell/v1.0/"
set-environment -g LANG "en_US.UTF-8"
set-environment -g LC_CTYPE "en_US.UTF-8"
set-environment -g COLORTERM "truecolor"

# Help Yazi choose the right image backend in tmux.
if-shell "test -n \"$WT_SESSION\"" "set-environment -g TERM_PROGRAM WindowsTerminal"
if-shell "test \"$MSYSCON\" = mintty.exe" "set-environment -g TERM_PROGRAM mintty"

set -g mouse on
set -g focus-events on
# Yazi image previews need escape passthrough plus the outer terminal identity.
set -g allow-passthrough on
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g detach-on-destroy off
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

set -g default-terminal "tmux-256color"
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM TERM_PROGRAM COLORTERM XDG_SESSION_TYPE KITTY_WINDOW_ID KITTY_LISTEN_ON WEZTERM_EXECUTABLE WEZTERM_UNIX_SOCKET WT_SESSION"
set -as terminal-features ",xterm*:RGB:sixel,screen-256color:RGB,tmux-256color:RGB"
set -g set-clipboard on
set-environment -g TMUX_PLUGIN_MANAGER_PATH "/home/ok/.tmux/plugins/"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "fcsonline/tmux-thumbs"
set -g @plugin "sainnhe/tmux-fzf"
set -g @plugin "wfxr/tmux-fzf-url"
set -g @plugin "omerxx/catppuccin-tmux"
set -g @plugin "omerxx/tmux-sessionx"
set -g @plugin "omerxx/tmux-floax"

set -g @floax-width "80%"
set -g @floax-height "80%"
set -g @floax-border-color "magenta"
set -g @floax-text-color "blue"
set -g @floax-bind "p"
set -g @floax-change-path "true"

set -g @sessionx-bind "o"
set -g @sessionx-bind-zo-new-window "ctrl-y"
set -g @sessionx-auto-accept "off"
set -g @sessionx-custom-paths "/home/ok/.dotfiles,/home/ok/ok"
set -g @sessionx-custom-paths-subdirectories "false"
set -g @sessionx-filter-current "false"
set -g @sessionx-window-height "85%"
set -g @sessionx-window-width "75%"
set -g @sessionx-x-path "/home/ok/.dotfiles"
if-shell "command -v zoxide >/dev/null 2>&1" "set -g @sessionx-zoxide-mode 'on'" "set -g @sessionx-zoxide-mode 'off'"

set -g @continuum-restore "on"
set -g @resurrect-strategy-nvim "session"

set -g @fzf-url-fzf-options "-p 60%,30% --prompt='open url: ' --border-label=' Open URL '"
set -g @fzf-url-history-limit "2000"

set -g @catppuccin_flavour "mocha"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_modules_left ""
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C new-window -n codex -c "#{pane_current_path}" "codex"

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "/c/Windows/System32/clip.exe"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/c/Windows/System32/clip.exe"

set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

if-shell "test -x ~/.tmux/plugins/tpm/tpm" "run '~/.tmux/plugins/tpm/tpm'" "display-message 'TPM missing: clone tmux-plugins/tpm to ~/.tmux/plugins/tpm'"
