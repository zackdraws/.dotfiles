# Dotfiles script linking configuration.
#
# - Linux/Arch links command scripts into /usr/local/bin with sudo.
# - MSYS2/Windows links command scripts into ~/.local/bin without sudo.
# - Native Windows shims are generated by link-windows-scripts.ps1 into
#   %USERPROFILE%\.local\bin.
#
# - sh/fix/list.sh used to be a hand-written list of sudo ln -s commands.
#   It had stale paths and duplicate command names, so it now delegates to
#   sh/setup/link-sh-scripts.sh.
# - Windows/MSYS2 prefers PC-safe variants where they already exist:
#   sh/PC/untar.sh replaces sh/convert/untar.sh as untar.sh.
#   sh/PC/FI_^ replaces sh/move/FI_^.sh as FI_^.sh.
# - Scripts in sh/trash are not linked.
# - Maintenance scripts in sh/fix, sh/install, and sh/setup are opt-in with
#   --include-maintenance because several of them change system state.
#
#   bash sh/setup/link-sh-scripts.sh
#   bash sh/setup/link-sh-scripts.sh --dry-run
#   bash sh/setup/link-sh-scripts.sh --include-maintenance
#   powershell.exe -ExecutionPolicy Bypass -File sh/setup/link-windows-scripts.ps1 -AddToUserPath

DOTFILES_LINUX_BIN_DIR="${DOTFILES_LINUX_BIN_DIR:-/usr/local/bin}"
DOTFILES_MSYS_BIN_DIR="${DOTFILES_MSYS_BIN_DIR:-$HOME/.local/bin}"

DOTFILES_SCRIPT_ROOTS=(
  sh/convert
  sh/copy
  sh/delete
  sh/document
  sh/export
  sh/file
  sh/format
  sh/launch
  sh/make
  sh/maketiny
  sh/move
  sh/plan
  sh/psd
  sh/rename
  sh/run
  sh/shell_files
  sh/web
)

DOTFILES_MAINTENANCE_SCRIPT_ROOTS=(
  sh/fix
  sh/install
  sh/setup
)

DOTFILES_SKIP_PATHS=(
  sh/trash
  sh/ps1
  sh/fix/debloat-pc
  sh/fix/fix.sh
  sh/fix/list.sh
  sh/format/date_out
  sh/setup/dotfiles-script-links.conf
)

DOTFILES_WINDOWS_SKIP_PATHS=(
  sh/fix/arch-audio
  sh/fix/arch-rm-pacman-cache
  sh/fix/fix-mount.sh
  sh/fix/hard-drive
  sh/fix/permanent-drive
  sh/fix/set-default-imv
  sh/fix/set-default-pdf-to-open
  sh/fix/set-default-sioyek
  sh/fix/set-default-sioyek-mime
  sh/fix/shutdown-reset-suspend-arch.sh
  sh/fix/wifi-restart
  sh/launch/ghostty-launcher.sh
  sh/run/record.sh
)

# source|command-name
DOTFILES_COMMAND_ALIASES=(
  "sh/document/ffmpeg-record|ffmpeg-record-gdigrab"
  "sh/shell_files/jfif_jpeg.sh|shell_jfif_jpeg.sh"
)

# old-source|windows-source|command-name
DOTFILES_WINDOWS_REPLACEMENTS=(
  "sh/convert/untar.sh|sh/PC/untar.sh|untar.sh"
  "sh/move/FI_^.sh|sh/PC/FI_^|FI_^.sh"
)
